pool:
  vmImage: 'ubuntu-latest'

trigger:
  batch: true
  branches:
    include:
    - master

pr: none

steps:
- task: CopyFiles@2
  inputs:
    Contents: |
      public/**/*
      src/**/*
      package.json
      package-lock.json
      vue.config.js
      nginx.conf
      index.html
      .eslintrc*
      .dockerignore
      tsconfig.json
      tsconfig.config.json
      vite.config.ts
      Dockerfile
      env.d.ts
    TargetFolder: '$(Build.StagingDirectory)/'

- task: PublishBuildArtifacts@1
  inputs:
    PathtoPublish: '$(Build.StagingDirectory)'
    ArtifactName: 'drop'
    publishLocation: 'Container'